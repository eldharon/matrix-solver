<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Matrix Solver - Tests</title>
<style>
  body { font-family: -apple-system, 'Segoe UI', Roboto, monospace; background: #0f0f1a; color: #e0e0e0; padding: 16px; font-size: 14px; }
  h1 { font-size: 18px; color: #7eb8ff; }
  #summary { font-size: 16px; font-weight: 700; margin: 12px 0; padding: 10px 12px; border-radius: 8px; }
  .ok { background: #1a3a2a; color: #4ade80; }
  .bad { background: #3a1a1a; color: #f87171; }
  .row { padding: 4px 8px; border-bottom: 1px solid #222; }
  .row.pass { color: #6ee7a8; }
  .row.fail { color: #f87171; }
  .detail { color: #f0a35b; font-size: 12px; margin-left: 18px; white-space: pre-wrap; }
</style>
</head>
<body>
<h1>Matrix Solver &mdash; unit tests</h1>
<div id="summary">Running&hellip;</div>
<div id="list"></div>

<script>
// Called by solver.test.js once tests finish.
window.renderTestResults = function (s) {
  var sum = document.getElementById('summary');
  sum.textContent = s.passed + ' passed, ' + s.failed + ' failed';
  sum.className = s.failed ? 'bad' : 'ok';
  var list = document.getElementById('list');
  list.innerHTML = s.results.map(function (r) {
    return '<div class="row ' + (r.ok ? 'pass' : 'fail') + '">' +
      (r.ok ? '✓ ' : '✗ ') + r.name +
      (r.ok ? '' : '<div class="detail">' + r.detail + '</div>') + '</div>';
  }).join('');
};
</script>
<script src="solver.js"></script>
<script src="solver.test.js"></script>
</body>
</html>
